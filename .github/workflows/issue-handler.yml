name: Agent Pipeline Handler

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  handle:
    runs-on: [self-hosted, agent-team]
    if: >-
      github.event_name == 'issue_comment' ||
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && (
        startsWith(github.event.label.name, 'state:') ||
        startsWith(github.event.label.name, 'gate:')
      ))
    concurrency:
      group: agent-pipeline-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - name: Write event context
        shell: bash
        run: |
          mkdir -p /tmp/agent-team
          cat > /tmp/agent-team/event.json << 'EVENTEOF'
          ${{ toJSON(github.event) }}
          EVENTEOF

      - name: Run orchestrator
        shell: bash
        working-directory: /app
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          npx tsx src/cli.ts handle-event /tmp/agent-team/event.json
