name: Agent Pipeline Handler

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  issues: read

jobs:
  relay:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment' ||
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && (
        startsWith(github.event.label.name, 'state:') ||
        startsWith(github.event.label.name, 'gate:') ||
        startsWith(github.event.label.name, 'team:')
      ))

    steps:
      - name: Relay event to orchestrator
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "$ORCHESTRATOR_URL" ]; then
            echo "::error::ORCHESTRATOR_URL secret not set"
            exit 1
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${ORCHESTRATOR_URL}/api/trigger/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
            -d '${{ toJSON(github.event) }}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Orchestrator returned $HTTP_CODE"
            exit 1
          fi
